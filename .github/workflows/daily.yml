name: Daily MAD-MIA flight deal check

on:
  schedule:
    # 06:00 UTC ≈ 07:00 Madrid time (CET). During CEST (summer) this runs
    # 08:00 Madrid local — GitHub Actions cron doesn't follow DST.
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-deals:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run flight deal agent
        env:
          DUFFEL_API_KEY: ${{ secrets.DUFFEL_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: node index.js

      - name: Commit updated history.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          git diff --staged --quiet || git commit -m "Update fare history [skip ci]"
          git push
