<svg width="680" height="660" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" role="img">
<title>MAD to MIA flight scanning pipeline</title>
<desc>A daily GitHub Actions cron job fetches flight offers from Duffel, an agent step compares prices to history and picks the best deals, then an email is sent, with all results logged to price history.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>
  text { font-family: -apple-system, "Segoe UI", Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 500; }
  .ts { font-size: 12px; }
  .box { fill: #F1EFE8; stroke: #888780; }
</style>

<rect x="250" y="20" width="180" height="56" rx="8" stroke-width="0.5" fill="#F1EFE8" stroke="#888780"/>
<text class="th" x="340" y="38" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">GitHub Actions</text>
<text class="ts" x="340" y="56" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Daily cron trigger</text>
<line x1="340" y1="76" x2="340" y2="110" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="250" y="110" width="180" height="56" rx="8" stroke-width="0.5" fill="#E6F1FB" stroke="#185FA5"/>
<text class="th" x="340" y="128" text-anchor="middle" dominant-baseline="central" fill="#042C53">Fetch script</text>
<text class="ts" x="340" y="146" text-anchor="middle" dominant-baseline="central" fill="#0C447C">Duffel offer requests</text>
<line x1="340" y1="166" x2="340" y2="200" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="250" y="200" width="180" height="56" rx="8" stroke-width="0.5" fill="#EEEDFE" stroke="#534AB7"/>
<text class="th" x="340" y="218" text-anchor="middle" dominant-baseline="central" fill="#26215C">Claude agent step</text>
<text class="ts" x="340" y="236" text-anchor="middle" dominant-baseline="central" fill="#3C3489">Rank offers vs history</text>
<line x1="340" y1="256" x2="340" y2="290" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="480" y="200" width="150" height="56" rx="8" stroke-width="0.5" fill="#F1EFE8" stroke="#888780"/>
<text class="th" x="555" y="218" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Price history</text>
<text class="ts" x="555" y="236" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">JSON in repo</text>
<path d="M430 228 L480 228" fill="none" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>
<path d="M480 244 L455 244 L455 234 L430 234" fill="none" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="250" y="290" width="180" height="56" rx="8" stroke-width="0.5" fill="#FAECE7" stroke="#993C1D"/>
<text class="th" x="340" y="308" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Email step</text>
<text class="ts" x="340" y="326" text-anchor="middle" dominant-baseline="central" fill="#712B13">Send via Resend API</text>
<line x1="340" y1="346" x2="340" y2="380" stroke="#5F5E5A" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="260" y="380" width="160" height="44" rx="8" stroke-width="0.5" fill="#F1EFE8" stroke="#888780"/>
<text class="th" x="340" y="402" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Your inbox</text>
</svg>
